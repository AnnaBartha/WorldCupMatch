services:
  match-db:
    image: mysql:8.0
    container_name: match-db
    environment:
      MYSQL_DATABASE: match_db
      MYSQL_ROOT_PASSWORD: BarthaAlma2002
    ports:
      - "3308:3306"
    volumes:
      - match-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pBarthaAlma2002"]
      interval: 5s
      timeout: 5s
      retries: 10

  match-service:
    image: worldcup-match-service:1.0
    container_name: match-service
    depends_on:
      match-db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://match-db:3306/match_db
      DB_USERNAME: root
      DB_PASSWORD: BarthaAlma2002
    ports:
      - "8082:8082"

volumes:
  match-db-data: